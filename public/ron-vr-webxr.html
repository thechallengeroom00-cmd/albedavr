      for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(402+i*55,400,18,0,Math.PI*2);ctx.fillStyle=i<pins.length?"#74cf57":"rgba(255,255,255,.25)";ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke()}
      xrGl.bindTexture(xrGl.TEXTURE_2D,xrHudTexture);xrGl.pixelStorei(xrGl.UNPACK_FLIP_Y_WEBGL,true);xrGl.texImage2D(xrGl.TEXTURE_2D,0,xrGl.RGBA,xrGl.RGBA,xrGl.UNSIGNED_BYTE,xrHudCanvas);xrGl.pixelStorei(xrGl.UNPACK_FLIP_Y_WEBGL,false);
    }
    function loadXRPanorama(level){
      if(!xrGl||!xrPanoTexture)return;const image=new Image();image.onload=()=>{if(!xrGl)return;xrGl.bindTexture(xrGl.TEXTURE_2D,xrPanoTexture);xrGl.pixelStorei(xrGl.UNPACK_FLIP_Y_WEBGL,false);xrGl.texImage2D(xrGl.TEXTURE_2D,0,xrGl.RGBA,xrGl.RGBA,xrGl.UNSIGNED_BYTE,image)};image.src="/ron-vr/"+level.bg;
    }
    function bindXRQuad(program){const gl=xrGl,loc=gl.getAttribLocation(program,"p");gl.bindBuffer(gl.ARRAY_BUFFER,xrQuad);gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)}
    function drawXRPointSet(view,positions,color,size){
      if(!positions.length)return;const gl=xrGl;gl.useProgram(xrPointProgram);const loc=gl.getAttribLocation(xrPointProgram,"p");gl.bindBuffer(gl.ARRAY_BUFFER,xrPointBuffer);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(positions),gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,3,gl.FLOAT,false,0,0);gl.uniformMatrix4fv(gl.getUniformLocation(xrPointProgram,"mvp"),false,multiplyMatrices(view.projectionMatrix,view.transform.inverse.matrix));gl.uniform4f(gl.getUniformLocation(xrPointProgram,"color"),color[0],color[1],color[2],1);gl.uniform1f(gl.getUniformLocation(xrPointProgram,"size"),size);gl.drawArrays(gl.POINTS,0,positions.length/3)
    }
    function drawXRPoints(frame,view){
      for(const source of xrSession.inputSources){if(source.hand){const positions=[];for(const joint of source.hand.values()){const pose=frame.getJointPose(joint,xrRefSpace);if(pose)positions.push(pose.transform.position.x,pose.transform.position.y,pose.transform.position.z)}drawXRPointSet(view,positions,source.handedness==="left"?[.98,.68,.48]:[.88,.48,.3],38)}else if(source.gripSpace||source.targetRaySpace){const pose=frame.getPose(source.gripSpace||source.targetRaySpace,xrRefSpace);if(pose)drawXRPointSet(view,[pose.transform.position.x,pose.transform.position.y,pose.transform.position.z],[.25,.68,1],42)}}
    }
    function pollXRInput(frame){
      for(const source of xrSession.inputSources){let active=false;if(source.hand){const thumb=source.hand.get("thumb-tip"),finger=source.hand.get("index-finger-tip"),a=thumb&&frame.getJointPose(thumb,xrRefSpace),b=finger&&frame.getJointPose(finger,xrRefSpace);if(a&&b){const dx=a.transform.position.x-b.transform.position.x,dy=a.transform.position.y-b.transform.position.y,dz=a.transform.position.z-b.transform.position.z;active=Math.hypot(dx,dy,dz)<.032}}else if(source.gamepad){active=Boolean(source.gamepad.buttons[0]&&source.gamepad.buttons[0].pressed)}const previous=xrInputState.get(source)||false;if(active&&!previous)xrActivate();xrInputState.set(source,active)}
    }
    function xrFrame(time,frame){
      const session=frame.session,pose=frame.getViewerPose(xrRefSpace);session.requestAnimationFrame(xrFrame);if(!pose)return;pollXRInput(frame);if(!xrHudModel)xrHudModel=multiplyMatrices(multiplyMatrices(new Float32Array(pose.transform.matrix),translationMatrix(0,-.32,-2.2)),scaleMatrix(.82,.41,1));const gl=xrGl,layer=session.renderState.baseLayer;gl.bindFramebuffer(gl.FRAMEBUFFER,layer.framebuffer);gl.disable(gl.SCISSOR_TEST);gl.disable(gl.DEPTH_TEST);gl.viewport(0,0,layer.framebufferWidth,layer.framebufferHeight);gl.clearColor(.02,.08,.16,1);gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);for(const view of pose.views){const viewport=layer.getViewport(view);gl.viewport(viewport.x,viewport.y,viewport.width,viewport.height);gl.enable(gl.SCISSOR_TEST);gl.scissor(viewport.x,viewport.y,viewport.width,viewport.height);gl.useProgram(xrPanoProgram);bindXRQuad(xrPanoProgram);const q=view.transform.orientation,p=view.projectionMatrix;gl.uniform4f(gl.getUniformLocation(xrPanoProgram,"head"),q.x,q.y,q.z,q.w);gl.uniform4f(gl.getUniformLocation(xrPanoProgram,"projection"),p[0],p[5],p[8],p[9]);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,xrPanoTexture);gl.uniform1i(gl.getUniformLocation(xrPanoProgram,"image"),0);gl.drawArrays(gl.TRIANGLES,0,6);gl.enable(gl.DEPTH_TEST);gl.clear(gl.DEPTH_BUFFER_BIT);gl.useProgram(xrHudProgram);bindXRQuad(xrHudProgram);gl.uniformMatrix4fv(gl.getUniformLocation(xrHudProgram,"mvp"),false,multiplyMatrices(multiplyMatrices(view.projectionMatrix,view.transform.inverse.matrix),xrHudModel));gl.bindTexture(gl.TEXTURE_2D,xrHudTexture);gl.uniform1i(gl.getUniformLocation(xrHudProgram,"image"),0);gl.drawArrays(gl.TRIANGLES,0,6);drawXRPoints(frame,view);gl.disable(gl.DEPTH_TEST)}gl.disable(gl.SCISSOR_TEST)}
    function xrActivate(){
      const now=performance.now();if(xrComplete||now-xrLastActivate<650)return;xrLastActivate=now;if(index<5){const level=levels[index];if(!pins.includes(level.pin))pins.push(level.pin);index++;choice="";render()}else{xrComplete=true;celebrate();updateXRHud()}
    }
    async function startXR(){
      const note=document.getElementById("xrNote");if(!navigator.xr||!isSecureContext){note.textContent="WebXR vereist HTTPS of localhost. Publiceer deze map eerst via een beveiligde webserver.";note.classList.add("show");return}
      try{xrSession=await navigator.xr.requestSession("immersive-vr",{requiredFeatures:["local-floor"],optionalFeatures:["hand-tracking"]});const canvas=document.getElementById("xrCanvas");xrGl=canvas.getContext("webgl",{xrCompatible:true,alpha:false,antialias:true});await xrGl.makeXRCompatible();xrSession.updateRenderState({baseLayer:new XRWebGLLayer(xrSession,xrGl)});xrRefSpace=await xrSession.requestReferenceSpace("local-floor");initXRGraphics();xrComplete=false;xrHudModel=null;xrLastActivate=0;xrInputState.clear();loadXRPanorama(levels[index]);updateXRHud();document.body.classList.add("xr-active");xrSession.addEventListener("select",xrActivate);xrSession.addEventListener("end",()=>{document.body.classList.remove("xr-active");xrSession=null;xrGl=null;xrHudModel=null;xrInputState.clear();document.getElementById("enterVr").textContent="Start VR"});xrSession.requestAnimationFrame(xrFrame)}catch(error){note.textContent="VR kon niet starten: "+(error&&error.message?error.message:"controleer de headsetrechten");note.classList.add("show")}
    }
    async function detectXR(){
      const button=document.getElementById("enterVr"),note=document.getElementById("xrNote");if(!navigator.xr){button.disabled=true;button.textContent="VR niet beschikbaar";return}if(!isSecureContext){button.disabled=false;button.textContent="VR publiceren";return}try{const supported=await navigator.xr.isSessionSupported("immersive-vr");button.disabled=!supported;button.textContent=supported?"Start VR":"VR niet beschikbaar";if(supported)note.classList.remove("show")}catch(_){button.disabled=true}}
    function setupPlayerHands(){
      const layer=document.getElementById("playerHands"),left=layer.querySelector(".left"),right=layer.querySelector(".right"),status=document.getElementById("handStatus");
      let tx=0,ty=0;
      addEventListener("pointermove",e=>{
        tx=(e.clientX/innerWidth-.5)*34;ty=(e.clientY/innerHeight-.55)*18;
        right.style.translate=tx+"px "+ty+"px";left.style.translate=(-tx*.35)+"px "+(ty*.2)+"px";
      });
      addEventListener("pointerdown",()=>layer.classList.add("grabbing"));
      addEventListener("pointerup",()=>layer.classList.remove("grabbing"));
      addEventListener("pointercancel",()=>layer.classList.remove("grabbing"));
      if(navigator.xr){
        navigator.xr.isSessionSupported("immersive-vr").then(supported=>{
          status.textContent=supported?"Hand-tracking voorbereid":"Virtuele handen actief";
        }).catch(()=>{});
      }
    }
    detectXR();
    setupPlayerHands();
    render();
