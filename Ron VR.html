<body>
  <main class="app">

  </main>
  <canvas class="xr-canvas" id="xrCanvas"></canvas>
  <script>
    const levels=[
      {eye:"Level 1",title:"Het begin",text:"Ron heet je welkom bij deze Albeda NEXT VR experience.",action:"Ga naar binnen",pin:"Communiceren",mark:"HI",pinType:"intro",meaning:"Je maakt contact, stelt je open en start de Albeda NEXT ervaring.",scene:"school",room:"A0.01",roomName:"Entree",bg:"pano-1-entrance.png",pose:"welcome",start:50},
      {eye:"Level 2",title:"Kick-off Festival",text:"Klik hier door om de kick-off video te zien.",action:"Bekijk de show",pin:"Creatief denken",mark:"LIVE",pinType:"festival",meaning:"Je laat je inspireren door nieuwe ideeen, energie en verbeelding.",scene:"festival",room:"A1.12",roomName:"Mediazaal",bg:"pano-2-media.png",pose:"watch",start:50},
      {eye:"Level 3",title:"IMPACT Lab",text:"Kies je route: Rotterdam Wereldstad of Rotterdam Zorgzame Stad.",action:"Kies je route",pin:"Sociaal-cultureel",mark:"010",pinType:"rotterdam",meaning:"Je ziet Rotterdam als wereldstad en als zorgzame stad vol verschillende mensen.",scene:"city",room:"B2.04",roomName:"IMPACT Lab",bg:"pano-3-rotterdam.png",pose:"explore",start:48},
      {eye:"Level 4",title:"Doe iets met impact",text:"Kijk rond en kies een opdracht in het Impact Lab.",action:"Start de challenge",pin:"Probleem oplossen",mark:"+",pinType:"impact",meaning:"Je maakt keuzes, weegt gevolgen af en vindt een oplossing met impact.",scene:"challenge",room:"B2.08",roomName:"Impact Lab",bg:"pano-4-impact.png",pose:"choose",start:54},
      {eye:"Level 5",title:"Presenteer in het auditorium",text:"Sta voorin het auditorium, kijk naar het publiek en presenteer jullie opdracht.",action:"Presenteer opdracht",pin:"Samenwerken",mark:"WIJ",pinType:"together",meaning:"Samenwerken, delen en trots laten zien wat jullie hebben bereikt.",scene:"finale",room:"C3.11",roomName:"Auditorium",bg:"pano-5-project.png",pose:"present",start:50},

    let index=0,pins=[],choice="",routeChallenge="",routePicker=false,routeQuizStep=0,routeQuizAnswered=false,impactStep=0,impactPicked=-1,impactFeedback="",impactBudget=[],impactMatch=-1;

      world:{title:"Wereldstad",label:"Rotterdam Wereldstad",icon:"🌍",image:"route-worldstad-choice.png",text:"Een stad van verschillende culturen, haven, makers en kansen in de stad.",challengeTitle:"Challenge: Maak de wereldstad zichtbaar",challenge:"Beantwoord de vragen een voor een. Na je keuze zie je meteen de beste denkrichting.",questions:[{q:"Wat maakt Rotterdam een wereldstad?",options:["Haven en handel","Veel culturen","Allebei"],answer:2,feedback:"Sterk: Rotterdam is juist wereldstad door de combinatie van handel, haven, mensen en culturen."},{q:"Waar ontstaat volgens jou de meeste kans?",options:["Bij makers","Bij studenten","Bij samenwerken"],answer:2,feedback:"Samenwerken levert de meeste impact op: makers, studenten en bewoners versterken elkaar."},{q:"Hoe verbind je verschillende groepen?",options:["Event maken","Verhalen delen","Samen oplossen"],answer:2,feedback:"Samen iets oplossen maakt contact concreet en zorgt dat iedereen een rol krijgt."}],dilemma:{q:"Je hebt budget voor één actie. Wat kies je?",options:["Groot event","Kleine ontmoeting","Online campagne"],answer:1,feedback:"Een kleine ontmoeting geeft ruimte voor echt contact. Daarna kun je het groter maken."}},
      care:{title:"Zorgzame stad",label:"Rotterdam Zorgzame Stad",icon:"🤝",image:"route-zorgzaam-choice.png",text:"Kijk waar hulp, aandacht en verbinding het verschil maken.",challengeTitle:"Challenge: Ontwerp een zorgzame actie",challenge:"Beantwoord de vragen een voor een. Na je keuze zie je meteen de beste denkrichting.",questions:[{q:"Wie heeft nu het meeste aandacht nodig?",options:["Wie hulp vraagt","Wie stil blijft","De hele groep"],answer:1,feedback:"Goed kijken is belangrijk: wie stil blijft, wordt vaak het makkelijkst over het hoofd gezien."},{q:"Welke actie kun je meteen doen?",options:["Luisteren","Samen helpen","Hulp regelen"],answer:0,feedback:"Luisteren is vaak de eerste stap. Daardoor ontdek je welke hulp echt nodig is."},{q:"Wie betrek je erbij?",options:["Klasgenoten","Buurtteam","Familie of mentor"],answer:0,feedback:"Begin dichtbij met klasgenoten. Samen kun je daarna grotere hulp inschakelen."}],dilemma:{q:"Er is weinig tijd. Wat doe je eerst?",options:["Snel helpen","Goed luisteren","Hulp inschakelen"],answer:1,feedback:"Goed luisteren voorkomt dat je te snel de verkeerde oplossing kiest."}}
    };
    const impactThemes=[
      {id:"green",type:"cleanup",icon:"🌱",title:"Groene stad",text:"Ruim slim op en kies de juiste afvalbak.",mission:"Maak het plein groen",result:"Top. Het plein is schoner omdat je afval niet alleen opraapte, maar ook goed sorteerde.",items:[{icon:"🥤",name:"Plastic beker",bin:0},{icon:"📰",name:"Folder op straat",bin:1},{icon:"🍌",name:"Bananenschil",bin:2}],bins:["PMD","Papier","GFT"]},
      {id:"money",type:"budget",icon:"€",title:"Money fit",text:"Maak een weekbudget kloppend door keuzes te schuiven.",mission:"Fix je weekbudget",result:"Je budget klopt. Je hebt verschil gemaakt tussen nodig, handig en later.",income:50,expenses:[{name:"Lunch school",amount:12,keep:true},{name:"OV naar stage",amount:8,keep:true},{name:"Game skin",amount:9,keep:false},{name:"Snacks",amount:7,keep:false},{name:"Schoolspullen",amount:18,keep:true},{name:"Streaming extra",amount:10,keep:false}]},
      {id:"health",type:"choice",icon:"❤",title:"Gezond leven",text:"Kies wat echt helpt, ook als iets aantrekkelijker lijkt.",mission:"Maak de slimme pauzekeuze",result:"Goed bezig. Je kiest niet alleen wat lekker lijkt, maar wat je energie echt helpt.",choices:[{icon:"💧",name:"Water",best:true,feedback:"Water is hier de beste keuze: het helpt je concentratie zonder suikerpiek."},{icon:"🥤",name:"Cola",best:false,feedback:"Cola geeft snel energie, maar daarna vaak juist een dip."},{icon:"🧃",name:"Smoothie",best:false,feedback:"Lijkt gezond, maar kan veel suiker bevatten. Soms prima, maar water past beter bij deze pauze."}]},
      {id:"talent",type:"match",icon:"★",title:"Talent in de wijk",text:"Koppel talent aan een plek waar het zichtbaar wordt.",mission:"Zet talent in de spotlight",result:"Mooi. Talent groeit sneller als je iemand aan de juiste plek koppelt.",talent:{icon:"🎧",name:"Sam maakt beats"},stages:[{name:"Sportveld",best:false,feedback:"Kan leuk zijn, maar dit talent komt hier niet het sterkst naar voren."},{name:"Open mic avond",best:true,feedback:"Precies. Op een open mic kan Sam zijn beats laten horen en feedback krijgen."},{name:"Huiswerktafel",best:false,feedback:"Nuttig als ondersteuning, maar dit maakt het creatieve talent minder zichtbaar."}]}
    ];
    function pinIcon(type,size){
      const common='viewBox="0 0 100 100" aria-hidden="true"';
      if(type==="intro")return '<svg '+common+'><rect x="17" y="23" width="66" height="55" rx="9" fill="none" stroke="white" stroke-width="7"/><circle cx="37" cy="48" r="10" fill="white"/><path d="M22 69c4-12 26-12 30 0M58 40h17M58 52h17M58 64h11" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/><path d="M42 23v-8h16v8" fill="none" stroke="white" stroke-width="7"/></svg>';
      if(type==="festival")return '<svg '+common+'><path d="M24 19h52l-8 62H32z" fill="none" stroke="white" stroke-width="7" stroke-linejoin="round"/><path d="M30 34h40M36 67h28" stroke="white" stroke-width="7" stroke-linecap="round"/><path d="M50 39l5 10 11 2-8 8 2 11-10-5-10 5 2-11-8-8 11-2z" fill="white"/></svg>';
      if(type==="rotterdam")return '<svg '+common+'><path d="M13 72h74M22 70V46m56 24V35M26 45l24-20 24 11M50 25v47M20 58c19-16 41-16 62 0" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 20l5 7-5 7-5-7z" fill="white"/></svg>';

      return '<svg '+common+'><rect x="15" y="22" width="70" height="58" rx="8" fill="none" stroke="white" stroke-width="7"/><circle cx="37" cy="45" r="10" fill="white"/><circle cx="64" cy="45" r="10" fill="white"/><path d="M22 70c3-14 25-17 31-4 6-13 28-10 31 4" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/><path d="M27 18l8 7M73 18l-8 7" stroke="white" stroke-width="6" stroke-linecap="round"/></svg>';

    async function startXR(){
      const note=document.getElementById("xrNote");if(!navigator.xr||!isSecureContext){note.textContent="WebXR vereist HTTPS of localhost. Publiceer deze map eerst via een beveiligde webserver.";note.classList.add("show");return}

    }
    async function detectXR(){
      const button=document.getElementById("enterVr"),note=document.getElementById("xrNote");if(!navigator.xr){button.disabled=true;button.textContent="VR niet beschikbaar";return}if(!isSecureContext){button.disabled=false;button.textContent="VR publiceren";return}try{const supported=await navigator.xr.isSessionSupported("immersive-vr");button.disabled=!supported;button.textContent=supported?"Start VR":"VR niet beschikbaar";if(supported)note.classList.remove("show")}catch(_){button.disabled=true}}
    function setupPlayerHands(){
      const layer=document.getElementById("playerHands"),left=layer.querySelector(".left"),right=layer.querySelector(".right"),status=document.getElementById("handStatus");
      let tx=0,ty=0;
      addEventListener("pointermove",e=>{
        tx=(e.clientX/innerWidth-.5)*34;ty=(e.clientY/innerHeight-.55)*18;
        right.style.translate=tx+"px "+ty+"px";left.style.translate=(-tx*.35)+"px "+(ty*.2)+"px";
      });
      addEventListener("pointerdown",()=>layer.classList.add("grabbing"));
      addEventListener("pointerup",()=>layer.classList.remove("grabbing"));
      addEventListener("pointercancel",()=>layer.classList.remove("grabbing"));
      if(navigator.xr){
        navigator.xr.isSessionSupported("immersive-vr").then(supported=>{
          status.textContent=supported?"Hand-tracking voorbereid":"Virtuele handen actief";
        }).catch(()=>{});
      }
    }
    detectXR();
    setupPlayerHands();
